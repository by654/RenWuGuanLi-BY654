<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能任务管理器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            animation: fadeInDown 0.6s ease;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .input-section {
            background: white;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            animation: fadeInUp 0.6s ease;
        }

        .input-wrapper {
            position: relative;
        }

        #goalInput {
            width: 100%;
            min-height: 100px;
            max-height: 200px;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            line-height: 1.5;
            resize: vertical;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        #goalInput:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .input-hint {
            position: absolute;
            top: 15px;
            right: 15px;
            font-size: 12px;
            color: #999;
            pointer-events: none;
        }

        .button-group {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
        }

        .add-btn {
            padding: 12px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .add-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }

        .add-btn:active {
            transform: translateY(0);
        }

        .stats {
            display: flex;
            gap: 20px;
            font-size: 14px;
            color: #666;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .goals-container {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            min-height: 300px;
            animation: fadeInUp 0.6s ease;
        }

        .goal-item {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            margin-bottom: 10px;
            background: #f8f9fa;
            border-radius: 10px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .goal-item:hover {
            background: #e9ecef;
            transform: translateX(5px);
        }

        .goal-item.completed {
            opacity: 0.6;
            background: #e8f5e9;
        }

        .goal-item.ignored {
            opacity: 0.5;
            background: #f5f5f5;
            border-left: 4px solid #9e9e9e;
            order: 999; /* 置底 */
        }

        .goal-item.important {
            background: linear-gradient(135deg, #fff9c4 0%, #ffecb3 100%);
            border-left: 4px solid #ffc107;
        }

        .goal-item.pinned {
            order: -1;
            background: linear-gradient(135deg, #e3f2fd 0%, #bbdefb 100%);
            border-left: 4px solid #2196f3;
        }

        /* 状态叠加样式 */
        .goal-item.pinned.important {
            background: linear-gradient(135deg, #e3f2fd 0%, #bbdefb 50%, #fff9c4 100%);
            border-left: 4px solid #2196f3;
            border-right: 4px solid #ffc107;
        }

        .goal-item.pinned.completed {
            background: linear-gradient(135deg, #e3f2fd 0%, #bbdefb 50%, #e8f5e9 100%);
            border-left: 4px solid #2196f3;
            opacity: 0.7;
        }

        .goal-item.pinned.ignored {
            /* 忽略状态优先级最高，不能置顶 */
            background: linear-gradient(135deg, #f5f5f5 0%, #e0e0e0 100%);
            border-left: 4px solid #9e9e9e;
            border-right: 4px solid #9e9e9e;
            opacity: 0.6;
            order: 999; /* 忽略状态优先级最高，置底 */
        }

        .goal-item.important.completed {
            background: linear-gradient(135deg, #fff9c4 0%, #ffecb3 50%, #e8f5e9 100%);
            border-left: 4px solid #ffc107;
            opacity: 0.7;
        }

        .goal-item.important.ignored {
            background: linear-gradient(135deg, #fff9c4 0%, #ffecb3 50%, #f5f5f5 100%);
            border-left: 4px solid #ffc107;
            border-right: 4px solid #9e9e9e;
            opacity: 0.6;
            order: 999; /* 忽略状态优先级最高，置底 */
        }

        .goal-item.completed.ignored {
            background: linear-gradient(135deg, #e8f5e9 0%, #f5f5f5 100%);
            border-left: 4px solid #4caf50;
            border-right: 4px solid #9e9e9e;
            opacity: 0.5;
            order: 999; /* 忽略状态优先级最高，置底 */
        }

        .goal-item.pinned.important.completed {
            background: linear-gradient(135deg, #e3f2fd 0%, #bbdefb 33%, #fff9c4 66%, #e8f5e9 100%);
            border-left: 4px solid #2196f3;
            border-right: 4px solid #ffc107;
            opacity: 0.7;
        }

        .goal-item.pinned.important.ignored {
            /* 忽略状态优先级最高，不能置顶 */
            background: linear-gradient(135deg, #f5f5f5 0%, #e0e0e0 100%);
            border-left: 4px solid #9e9e9e;
            border-right: 4px solid #9e9e9e;
            opacity: 0.6;
            order: 999; /* 忽略状态优先级最高，置底 */
        }

        .goal-item.pinned.completed.ignored {
            /* 忽略状态优先级最高，不能置顶 */
            background: linear-gradient(135deg, #f5f5f5 0%, #e0e0e0 100%);
            border-left: 4px solid #9e9e9e;
            border-right: 4px solid #9e9e9e;
            opacity: 0.5;
            order: 999; /* 忽略状态优先级最高，置底 */
        }

        .goal-item.important.completed.ignored {
            background: linear-gradient(135deg, #fff9c4 0%, #ffecb3 33%, #e8f5e9 66%, #f5f5f5 100%);
            border-left: 4px solid #ffc107;
            border-right: 4px solid #9e9e9e;
            opacity: 0.5;
            order: 999; /* 忽略状态优先级最高，置底 */
        }

        .goal-item.pinned.important.completed.ignored {
            /* 忽略状态优先级最高，不能置顶 */
            background: linear-gradient(135deg, #f5f5f5 0%, #e0e0e0 100%);
            border-left: 4px solid #9e9e9e;
            border-right: 4px solid #9e9e9e;
            opacity: 0.5;
            order: 999; /* 忽略状态优先级最高，置底 */
        }

        /* 平滑移动动画 */
        .goal-item.moving {
            position: relative;
            z-index: 100;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .goal-checkbox {
            width: 20px;
            height: 20px;
            margin-right: 12px;
            cursor: pointer;
            accent-color: #667eea;
            flex-shrink: 0;
            z-index: 2;
        }

        .goal-text {
            flex: 1;
            font-size: 16px;
            color: #333;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            transition: all 0.3s ease;
            min-width: 0;
            user-select: none;
            cursor: pointer;
            padding: 5px;
            margin: -5px;
            z-index: 1;
        }

        .goal-item.completed .goal-text {
            text-decoration: line-through;
            color: #999;
        }

        .goal-item.ignored .goal-text {
            color: #999;
            font-style: italic;
        }

        .goal-item.completed.ignored .goal-text {
            text-decoration: line-through;
            color: #777;
            font-style: italic;
        }

        .goal-item.expanded {
            background: white;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            margin: 20px 0;
            cursor: default;
            transform: scale(1.02);
        }

        .goal-item.expanded:hover {
            transform: scale(1.02);
        }

        /* 展开状态下的叠加样式 */
        .goal-item.expanded.pinned {
            background: linear-gradient(135deg, #e3f2fd 0%, #bbdefb 100%);
            border-left: 4px solid #2196f3;
        }

        .goal-item.expanded.important {
            background: linear-gradient(135deg, #fff9c4 0%, #ffecb3 100%);
            border-left: 4px solid #ffc107;
        }

        .goal-item.expanded.ignored {
            background: linear-gradient(135deg, #f5f5f5 0%, #e0e0e0 100%);
            border-left: 4px solid #9e9e9e;
        }

        .goal-item.expanded.pinned.important {
            background: linear-gradient(135deg, #e3f2fd 0%, #bbdefb 50%, #fff9c4 100%);
            border-left: 4px solid #2196f3;
            border-right: 4px solid #ffc107;
        }

        .goal-item.expanded.pinned.completed {
            background: linear-gradient(135deg, #e3f2fd 0%, #bbdefb 50%, #e8f5e9 100%);
            border-left: 4px solid #2196f3;
        }

        .goal-item.expanded.pinned.ignored {
            /* 忽略状态优先级最高，不能置顶 */
            background: linear-gradient(135deg, #f5f5f5 0%, #e0e0e0 100%);
            border-left: 4px solid #9e9e9e;
            border-right: 4px solid #9e9e9e;
        }

        .goal-item.expanded.important.completed {
            background: linear-gradient(135deg, #fff9c4 0%, #ffecb3 50%, #e8f5e9 100%);
            border-left: 4px solid #ffc107;
        }

        .goal-item.expanded.important.ignored {
            background: linear-gradient(135deg, #fff9c4 0%, #ffecb3 50%, #f5f5f5 100%);
            border-left: 4px solid #ffc107;
            border-right: 4px solid #9e9e9e;
        }

        .goal-item.expanded.completed.ignored {
            background: linear-gradient(135deg, #e8f5e9 0%, #f5f5f5 100%);
            border-left: 4px solid #4caf50;
            border-right: 4px solid #9e9e9e;
        }

        .goal-item.expanded.pinned.important.completed {
            background: linear-gradient(135deg, #e3f2fd 0%, #bbdefb 33%, #fff9c4 66%, #e8f5e9 100%);
            border-left: 4px solid #2196f3;
            border-right: 4px solid #ffc107;
        }

        .goal-item.expanded.pinned.important.ignored {
            /* 忽略状态优先级最高，不能置顶 */
            background: linear-gradient(135deg, #f5f5f5 0%, #e0e0e0 100%);
            border-left: 4px solid #9e9e9e;
            border-right: 4px solid #9e9e9e;
        }

        .goal-item.expanded.pinned.completed.ignored {
            /* 忽略状态优先级最高，不能置顶 */
            background: linear-gradient(135deg, #f5f5f5 0%, #e0e0e0 100%);
            border-left: 4px solid #9e9e9e;
            border-right: 4px solid #9e9e9e;
        }

        .goal-item.expanded.important.completed.ignored {
            background: linear-gradient(135deg, #fff9c4 0%, #ffecb3 33%, #e8f5e9 66%, #f5f5f5 100%);
            border-left: 4px solid #ffc107;
            border-right: 4px solid #9e9e9e;
        }

        .goal-item.expanded.pinned.important.completed.ignored {
            /* 忽略状态优先级最高，不能置顶 */
            background: linear-gradient(135deg, #f5f5f5 0%, #e0e0e0 100%);
            border-left: 4px solid #9e9e9e;
            border-right: 4px solid #9e9e9e;
        }

        .expanded-content {
            display: none;
            grid-template-columns: 1fr auto;
            gap: 20px;
            align-items: start;
            padding: 20px;
            animation: slideIn 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .goal-item.expanded .expanded-content {
            display: grid;
        }

        .goal-item.expanded .goal-text {
            display: none;
        }

        .expanded-text {
            font-size: 18px;
            color: #333;
            line-height: 1.6;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
            max-height: 200px;
            overflow-y: auto;
            word-wrap: break-word;
            white-space: pre-wrap;
        }

        .expanded-text::-webkit-scrollbar {
            width: 6px;
        }

        .expanded-text::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 3px;
        }

        .expanded-text::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 3px;
        }

        .expanded-text::-webkit-scrollbar-thumb:hover {
            background: #555;
        }

        .action-buttons {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .action-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        .collapse-btn {
            background: #607d8b;
            color: white;
        }

        .collapse-btn:hover {
            background: #455a64;
            transform: translateY(-2px);
            box-shadow: 0 3px 10px rgba(96, 125, 139, 0.3);
        }

        .pin-btn {
            background: #2196f3;
            color: white;
        }

        .pin-btn:hover {
            background: #1976d2;
            transform: translateY(-2px);
            box-shadow: 0 3px 10px rgba(33, 150, 243, 0.3);
        }

        .pin-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .pin-btn:disabled:hover {
            background: #ccc;
            transform: none;
            box-shadow: none;
        }

        .important-btn {
            background: #ffc107;
            color: white;
        }

        .important-btn:hover {
            background: #ffb300;
            transform: translateY(-2px);
            box-shadow: 0 3px 10px rgba(255, 193, 7, 0.3);
        }

        .ignore-btn {
            background: #9e9e9e;
            color: white;
        }

        .ignore-btn:hover {
            background: #757575;
            transform: translateY(-2px);
            box-shadow: 0 3px 10px rgba(158, 158, 158, 0.3);
        }

        .edit-btn {
            background: #4caf50;
            color: white;
        }

        .edit-btn:hover {
            background: #45a049;
            transform: translateY(-2px);
            box-shadow: 0 3px 10px rgba(76, 175, 80, 0.3);
        }

        .delete-btn {
            background: #f44336;
            color: white;
        }

        .delete-btn:hover {
            background: #d32f2f;
            transform: translateY(-2px);
            box-shadow: 0 3px 10px rgba(244, 67, 54, 0.3);
        }

        .save-btn {
            background: #4caf50;
            color: white;
        }

        .save-btn:hover {
            background: #45a049;
            transform: translateY(-2px);
        }

        .cancel-btn {
            background: #9e9e9e;
            color: white;
        }

        .cancel-btn:hover {
            background: #757575;
            transform: translateY(-2px);
        }

        .edit-input {
            width: 100%;
            min-height: 100px;
            padding: 15px;
            border: 2px solid #667eea;
            border-radius: 10px;
            font-size: 18px;
            font-family: inherit;
            resize: vertical;
            line-height: 1.5;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .empty-state svg {
            width: 120px;
            height: 120px;
            margin-bottom: 20px;
            opacity: 0.3;
        }

        .empty-state h3 {
            font-size: 1.5rem;
            margin-bottom: 10px;
            color: #666;
        }

        .empty-state p {
            font-size: 1rem;
        }

        /* 底部操作栏 - 改为普通定位 */
        .bottom-toolbar {
            background: white;
            border-radius: 15px;
            padding: 25px;
            margin-top: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            animation: fadeInUp 0.6s ease;
        }

        .toolbar-header {
            text-align: center;
            margin-bottom: 20px;
        }

        .toolbar-title {
            font-size: 1.3rem;
            color: #333;
            margin-bottom: 5px;
        }

        .toolbar-subtitle {
            font-size: 0.9rem;
            color: #666;
        }

        .toolbar-content {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .toolbar-btn {
            padding: 12px 25px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
        }

        .refresh-btn {
            background: #00bcd4;
            color: white;
        }

        .refresh-btn:hover {
            background: #00acc1;
            transform: translateY(-2px);
            box-shadow: 0 3px 10px rgba(0, 188, 212, 0.3);
        }

        .clear-all-btn {
            background: #f44336;
            color: white;
        }

        .clear-all-btn:hover {
            background: #d32f2f;
            transform: translateY(-2px);
            box-shadow: 0 3px 10px rgba(244, 67, 54, 0.3);
        }

        .export-btn {
            background: #2196f3;
            color: white;
        }

        .export-btn:hover {
            background: #1976d2;
            transform: translateY(-2px);
            box-shadow: 0 3px 10px rgba(33, 150, 243, 0.3);
        }

        .import-btn {
            background: #4caf50;
            color: white;
        }

        .import-btn:hover {
            background: #45a049;
            transform: translateY(-2px);
            box-shadow: 0 3px 10px rgba(76, 175, 80, 0.3);
        }

        /* 导出文本框 */
        .export-box {
            background: white;
            border-radius: 15px;
            padding: 25px;
            margin-top: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            display: none;
            animation: slideDown 0.4s ease;
        }

        .export-box.show {
            display: block;
        }

        .export-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .export-title {
            font-size: 1.2rem;
            color: #333;
            font-weight: 500;
        }

        .close-export {
            background: none;
            border: none;
            font-size: 24px;
            color: #999;
            cursor: pointer;
            transition: color 0.3s ease;
        }

        .close-export:hover {
            color: #333;
        }

        .export-textarea {
            width: 100%;
            min-height: 200px;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 12px;
            font-family: 'Courier New', monospace;
            resize: vertical;
            line-height: 1.5;
            background: #f8f9fa;
        }

        .export-textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .export-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .copy-btn {
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .copy-btn:hover {
            background: #5a67d8;
            transform: translateY(-2px);
        }

        .download-btn {
            padding: 10px 20px;
            background: #4caf50;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .download-btn:hover {
            background: #45a049;
            transform: translateY(-2px);
        }

        .export-info {
            color: #666;
            font-size: 13px;
            margin-top: 10px;
            line-height: 1.5;
        }

        /* 模态框 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 2000;
            animation: fadeIn 0.3s ease;
        }

        .modal.show {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: white;
            border-radius: 15px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            animation: slideUp 0.3s ease;
        }

        .modal-header {
            margin-bottom: 20px;
        }

        .modal-title {
            font-size: 1.5rem;
            color: #333;
            margin-bottom: 10px;
        }

        .modal-body {
            margin-bottom: 20px;
        }

        .modal-textarea {
            width: 100%;
            min-height: 150px;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            font-family: 'Courier New', monospace;
            resize: vertical;
            line-height: 1.5;
        }

        .modal-textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }

        .modal-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .modal-confirm {
            background: #f44336;
            color: white;
        }

        .modal-confirm:hover {
            background: #d32f2f;
        }

        .modal-cancel {
            background: #9e9e9e;
            color: white;
        }

        .modal-cancel:hover {
            background: #757575;
        }

        .modal-primary {
            background: #667eea;
            color: white;
        }

        .modal-primary:hover {
            background: #5a67d8;
        }

        .modal-info {
            color: #666;
            font-size: 14px;
            margin-top: 10px;
            line-height: 1.5;
        }

        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            background: white;
            padding: 15px 20px;
            border-radius: 10px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            display: none;
            align-items: center;
            gap: 10px;
            z-index: 3000;
            animation: slideInRight 0.3s ease;
        }

        .toast.show {
            display: flex;
        }

        .toast.success {
            border-left: 4px solid #4caf50;
        }

        .toast.error {
            border-left: 4px solid #f44336;
        }

        .toast.info {
            border-left: 4px solid #2196f3;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeOut {
            from {
                opacity: 1;
                transform: translateX(0) scale(1);
            }
            to {
                opacity: 0;
                transform: translateX(-100%) scale(0.8);
            }
        }

        @keyframes slideInFromRight {
            from {
                opacity: 0;
                transform: translateX(20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(100%);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .goal-item.new-item {
            animation: slideInFromRight 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @media (max-width: 600px) {
            .header h1 {
                font-size: 2rem;
            }
            
            .expanded-content {
                grid-template-columns: 1fr;
            }
            
            .action-buttons {
                flex-direction: row;
                flex-wrap: wrap;
            }
            
            .stats {
                flex-direction: column;
                gap: 5px;
            }

            .toolbar-content {
                gap: 10px;
            }

            .toolbar-btn {
                padding: 10px 20px;
                font-size: 14px;
            }

            .modal-content {
                padding: 20px;
            }

            .export-actions {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>🎯 智能任务管理器</h1>
            <p>高效管理您的任务，成就更好的自己</p>
        </header>

        <section class="input-section">
            <div class="input-wrapper">
                <textarea id="goalInput" placeholder="输入您的任务，每行一个任务...&#10支持批量（换行）添加" rows"></textarea>
                <div class="input-hint"> </div>
            </div>
            <div class="button-group">
                <button class="add-btn" id="addBtn">
                    <span>➕</span>
                    <span id="addBtnText">添加</span>
                </button>
                <div class="stats">
                    <div class="stat-item">
                        <span>📊</span>
                        <span>总计: <strong id="totalCount">0</strong></span>
                    </div>
                    <div class="stat-item">
                        <span>✅</span>
                        <span>完成: <strong id="completedCount">0</strong></span>
                    </div>
                    <div class="stat-item">
                        <span>⭐</span>
                        <span>重要: <strong id="importantCount">0</strong></span>
                    </div>
                    <div class="stat-item">
                        <span>🙈</span>
                        <span>忽略: <strong id="ignoredCount">0</strong></span>
                    </div>
                </div>
            </div>
        </section>

        <section class="goals-container" id="goalsContainer">
            <div class="empty-state" id="emptyState">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M9 11l3 3L22 4"></path>
                    <path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"></path>
                </svg>
                <h3>还没有任务</h3>
                <p>开始添加您的第一个任务吧！</p>
            </div>
        </section>

        <!-- 底部操作栏 - 改为网页内容的一部分 -->
        <section class="bottom-toolbar">
            <div class="toolbar-header">
                <h2 class="toolbar-title">🛠️ 数据管理</h2>
                <p class="toolbar-subtitle">备份、导入或清空您的任务数据</p>
            </div>
            <div class="toolbar-content">
                <button class="toolbar-btn refresh-btn" onclick="goalManager.refreshData()">
                    🔄 刷新页面
                </button>
                <button class="toolbar-btn clear-all-btn" onclick="goalManager.showClearConfirm()">
                    🗑️ 清空所有
                </button>
                <button class="toolbar-btn export-btn" onclick="goalManager.showExportBox()">
                    📤 导出数据
                </button>
                <button class="toolbar-btn import-btn" onclick="goalManager.showImportModal()">
                    📥 导入数据
                </button>
            </div>
        </section>

        <!-- 导出文本框 -->
        <section class="export-box" id="exportBox">
            <div class="export-header">
                <h3 class="export-title">📋 导出的数据编码</h3>
                <button class="close-export" onclick="goalManager.hideExportBox()">×</button>
            </div>
            <textarea class="export-textarea" id="exportTextarea" readonly></textarea>
            <div class="export-actions">
                <button class="copy-btn" onclick="goalManager.copyToClipboard()">
                    📋 复制到剪贴板
                </button>
                <button class="download-btn" onclick="goalManager.downloadFile()">
                    💾 下载文件（当前环境不可用）
                </button>
            </div>
            <p class="export-info">
                💡 提示：您可以复制上面的编码保存到其他地方，需要时通过导入功能恢复数据。
            </p>
        </section>
    </div>

    <!-- 确认清空模态框 -->
    <div class="modal" id="clearModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">⚠️ 确认清空</h2>
            </div>
            <div class="modal-body">
                <p>您确定要清空所有任务吗？此操作不可恢复！</p>
                <p class="modal-info">建议先导出数据作为备份。</p>
            </div>
            <div class="modal-footer">
                <button class="modal-btn modal-cancel" onclick="goalManager.closeModal('clearModal')">取消</button>
                <button class="modal-btn modal-confirm" onclick="goalManager.clearAll()">确认清空</button>
            </div>
        </div>
    </div>

    <!-- 导入数据模态框 -->
    <div class="modal" id="importModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">📥 导入数据</h2>
            </div>
            <div class="modal-body">
                <p>请粘贴导出的数据编码：</p>
                <textarea class="modal-textarea" id="importData" placeholder="在此粘贴导出的JSON数据..."></textarea>
                <p class="modal-info">
                    注意：导入数据将覆盖当前所有任务。<br>
                    请确保数据格式正确。
                </p>
            </div>
            <div class="modal-footer">
                <button class="modal-btn modal-cancel" onclick="goalManager.closeModal('importModal')">取消</button>
                <button class="modal-btn modal-primary" onclick="goalManager.importData()">确认导入</button>
            </div>
        </div>
    </div>

    <!-- Toast 提示 -->
    <div class="toast" id="toast">
        <span id="toastMessage"></span>
    </div>

    <script>
        class GoalManager {
            constructor() {
                this.goals = this.loadGoals();
                this.editingId = null;
                this.exportData = null;
                this.isAnimating = false;
                this.init();
            }

            init() {
                this.bindEvents();
                this.render();
                this.updateStats();
            }

            bindEvents() {
                const input = document.getElementById('goalInput');
                const addBtn = document.getElementById('addBtn');

                addBtn.addEventListener('click', () => this.addGoals());
                
                input.addEventListener('keydown', (e) => {
                    if (e.ctrlKey && e.key === 'Enter') {
                        e.preventDefault();
                        this.addGoals();
                    }
                });

                input.addEventListener('input', () => this.updateAddButton());

                // 点击模态框背景关闭
                document.querySelectorAll('.modal').forEach(modal => {
                    modal.addEventListener('click', (e) => {
                        if (e.target === modal) {
                            this.closeModal(modal.id);
                        }
                    });
                });
            }

            updateAddButton() {
                const input = document.getElementById('goalInput');
                const btnText = document.getElementById('addBtnText');
                const lines = input.value.trim().split('\n').filter(line => line.trim());
                
                if (lines.length > 1) {
                    btnText.textContent = `批量添加 (${lines.length})`;
                } else if (lines.length === 1) {
                    btnText.textContent = '添加';
                } else {
                    btnText.textContent = '添加';
                }
            }

            addGoals() {
                const input = document.getElementById('goalInput');
                const lines = input.value.trim().split('\n').filter(line => line.trim());
                
                if (lines.length === 0) return;

                const newGoals = lines.map(text => ({
                    id: Date.now() + Math.random(),
                    text: text.trim(),
                    completed: false,
                    important: false,
                    pinned: false,
                    ignored: false,
                    createdAt: new Date().toISOString()
                }));

                this.goals.unshift(...newGoals);
                this.saveGoals();
                this.renderWithAnimation(newGoals);
                this.updateStats();
                
                input.value = '';
                this.updateAddButton();
                input.focus();
            }

            renderWithAnimation(newGoals) {
                const container = document.getElementById('goalsContainer');
                const emptyState = document.getElementById('emptyState');
                
                if (this.goals.length === 0) {
                    emptyState.style.display = 'block';
                    // 清空容器内容，只保留空状态
                    container.innerHTML = emptyState.outerHTML;
                    return;
                }
                
                emptyState.style.display = 'none';
                
                // 排序：置顶 > 普通 > 忽略
                const sortedGoals = [...this.goals].sort((a, b) => {
                    // 忽略的任务永远在最后
                    if (a.ignored && !b.ignored) return 1;
                    if (!a.ignored && b.ignored) return -1;
                    
                    // 置顶的任务在前面
                    if (a.pinned && !b.pinned) return -1;
                    if (!a.pinned && b.pinned) return 1;
                    
                    return 0;
                });
                
                const goalsHTML = sortedGoals.map(goal => {
                    const isNew = newGoals.some(g => g.id === goal.id);
                    return `
                        <div class="goal-item ${goal.completed ? 'completed' : ''} ${goal.important ? 'important' : ''} ${goal.pinned ? 'pinned' : ''} ${goal.ignored ? 'ignored' : ''} ${isNew ? 'new-item' : ''}" 
                             data-id="${goal.id}">
                            <input type="checkbox" class="goal-checkbox" 
                                   ${goal.completed ? 'checked' : ''} 
                                   onchange="goalManager.toggleComplete(${goal.id})">
                            <div class="goal-text" onclick="goalManager.toggleExpand(event, ${goal.id})">
                                ${goal.text}
                            </div>
                            <div class="expanded-content">
                                <div class="expanded-text">${goal.text}</div>
                                <div class="action-buttons">
                                    <button class="action-btn collapse-btn" onclick="goalManager.collapseGoal(${goal.id})">
                                        🔽 折叠
                                    </button>
                                    <button class="action-btn pin-btn" onclick="goalManager.togglePin(${goal.id})" 
                                            ${goal.ignored ? 'disabled' : ''}>
                                        ${goal.pinned ? '📌 取消置顶' : '📍 置顶'}
                                    </button>
                                    <button class="action-btn important-btn" onclick="goalManager.toggleImportant(${goal.id})">
                                        ${goal.important ? '⭐ 取消重要' : '☆ 设为重要'}
                                    </button>
                                    <button class="action-btn ignore-btn" onclick="goalManager.toggleIgnore(${goal.id})">
                                        ${goal.ignored ? '👁️ 取消忽略' : '🙈 忽略'}
                                    </button>
                                    <button class="action-btn edit-btn" onclick="goalManager.startEdit(${goal.id})">
                                        ✏️ 编辑
                                    </button>
                                    <button class="action-btn delete-btn" onclick="goalManager.deleteGoal(${goal.id})">
                                        🗑️ 删除
                                    </button>
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');
                
                container.innerHTML = emptyState.outerHTML + goalsHTML;
            }

            toggleComplete(id) {
                const goal = this.goals.find(g => g.id === id);
                if (goal) {
                    goal.completed = !goal.completed;
                    this.saveGoals();
                    this.updateGoalItem(id);
                    this.updateStats();
                }
            }

            toggleImportant(id) {
                const goal = this.goals.find(g => g.id === id);
                if (goal) {
                    goal.important = !goal.important;
                    this.saveGoals();
                    this.updateGoalItem(id);
                    this.updateStats();
                }
            }

            toggleIgnore(id) {
                const goal = this.goals.find(g => g.id === id);
                if (goal) {
                    goal.ignored = !goal.ignored;
                    
                    // 如果设置为忽略，自动取消置顶
                    if (goal.ignored && goal.pinned) {
                        goal.pinned = false;
                        this.showToast('已取消置顶并设置为忽略状态', 'info');
                    }
                    
                    this.saveGoals();
                    this.render(); // 重新渲染以更新排序
                    this.updateStats();
                }
            }

            togglePin(id) {
                if (this.isAnimating) return;
                
                const goal = this.goals.find(g => g.id === id);
                if (!goal || goal.ignored) {
                    if (goal && goal.ignored) {
                        this.showToast('忽略的任务不能置顶', 'error');
                    }
                    return;
                }
                
                const goalElement = document.querySelector(`[data-id="${id}"]`);
                
                if (!goalElement) return;
                
                this.isAnimating = true;
                
                // 获取当前元素的位置
                const currentRect = goalElement.getBoundingClientRect();
                const currentTop = currentRect.top;
                
                // 更新置顶状态
                goal.pinned = !goal.pinned;
                this.saveGoals();
                
                // 重新渲染以获取新的排序
                this.render();
                
                // 找到移动后的新位置
                const newGoalElement = document.querySelector(`[data-id="${id}"]`);
                if (newGoalElement) {
                    const newRect = newGoalElement.getBoundingClientRect();
                    const newTop = newRect.top;
                    
                    // 计算需要移动的距离
                    const distance = currentTop - newTop;
                    
                    if (Math.abs(distance) > 5) {
                        // 添加移动动画类
                        newGoalElement.classList.add('moving');
                        
                        // 设置初始位置
                        newGoalElement.style.transform = `translateY(${distance}px)`;
                        
                        // 强制重绘
                        newGoalElement.offsetHeight;
                        
                        // 执行移动动画
                        newGoalElement.style.transform = 'translateY(0)';
                        
                        // 动画完成后清理
                        setTimeout(() => {
                            newGoalElement.classList.remove('moving');
                            newGoalElement.style.transform = '';
                            this.isAnimating = false;
                        }, 600);
                    } else {
                        this.isAnimating = false;
                    }
                } else {
                    this.isAnimating = false;
                }
            }

            deleteGoal(id) {
                const index = this.goals.findIndex(g => g.id === id);
                if (index !== -1) {
                    const goalElement = document.querySelector(`[data-id="${id}"]`);
                    if (goalElement) {
                        goalElement.style.animation = 'fadeOut 0.3s ease';
                        setTimeout(() => {
                            this.goals.splice(index, 1);
                            this.saveGoals();
                            this.render();
                            this.updateStats();
                        }, 300);
                    }
                }
            }

            startEdit(id) {
                if (this.editingId) return;
                
                this.editingId = id;
                const goal = this.goals.find(g => g.id === id);
                const goalElement = document.querySelector(`[data-id="${id}"]`);
                const expandedText = goalElement.querySelector('.expanded-text');
                const actionButtons = goalElement.querySelector('.action-buttons');
                
                if (goal && expandedText) {
                    const input = document.createElement('textarea');
                    input.className = 'edit-input';
                    input.value = goal.text;
                    input.rows = 3;
                    
                    expandedText.replaceWith(input);
                    input.focus();
                    input.select();
                    
                    // 编辑模式下只显示保存和取消按钮，移除折叠按钮
                    actionButtons.innerHTML = `
                        <button class="action-btn save-btn" onclick="goalManager.saveEdit(${id})">
                            💾 保存
                        </button>
                        <button class="action-btn cancel-btn" onclick="goalManager.cancelEdit(${id})">
                            ❌ 取消
                        </button>
                    `;
                    
                    input.addEventListener('keydown', (e) => {
                        if (e.ctrlKey && e.key === 'Enter') {
                            e.preventDefault();
                            this.saveEdit(id);
                        } else if (e.key === 'Escape') {
                            this.cancelEdit(id);
                        }
                    });
                }
            }

            saveEdit(id) {
                const goal = this.goals.find(g => g.id === id);
                const goalElement = document.querySelector(`[data-id="${id}"]`);
                const input = goalElement.querySelector('.edit-input');
                
                if (goal && input && input.value.trim()) {
                    goal.text = input.value.trim();
                    this.saveGoals();
                    this.editingId = null;
                    this.render();
                }
            }

            cancelEdit(id) {
                this.editingId = null;
                this.render();
            }

            toggleExpand(event, id) {
                event.stopPropagation();
                const goalElement = document.querySelector(`[data-id="${id}"]`);
                if (goalElement && !this.editingId) {
                    goalElement.classList.toggle('expanded');
                }
            }

            collapseGoal(id) {
                const goalElement = document.querySelector(`[data-id="${id}"]`);
                if (goalElement) {
                    goalElement.classList.remove('expanded');
                }
            }

            updateGoalItem(id) {
                const goal = this.goals.find(g => g.id === id);
                const goalElement = document.querySelector(`[data-id="${id}"]`);
                
                if (goal && goalElement) {
                    // 保持展开状态，只更新样式类
                    const isExpanded = goalElement.classList.contains('expanded');
                    goalElement.className = `goal-item ${goal.completed ? 'completed' : ''} ${goal.important ? 'important' : ''} ${goal.pinned ? 'pinned' : ''} ${goal.ignored ? 'ignored' : ''} ${isExpanded ? 'expanded' : ''}`;
                    
                    const textElement = goalElement.querySelector('.goal-text');
                    const expandedText = goalElement.querySelector('.expanded-text');
                    
                    if (textElement) {
                        textElement.textContent = goal.text;
                    }
                    if (expandedText) {
                        expandedText.textContent = goal.text;
                    }
                }
            }

            updateStats() {
                const total = this.goals.length;
                const completed = this.goals.filter(g => g.completed).length;
                const important = this.goals.filter(g => g.important).length;
                const ignored = this.goals.filter(g => g.ignored).length;
                
                document.getElementById('totalCount').textContent = total;
                document.getElementById('completedCount').textContent = completed;
                document.getElementById('importantCount').textContent = important;
                document.getElementById('ignoredCount').textContent = ignored;
            }

            render() {
                this.renderWithAnimation([]);
            }

            // 底部工具栏功能
            showClearConfirm() {
                if (this.goals.length === 0) {
                    this.showToast('当前没有任务需要清空', 'info');
                    return;
                }
                document.getElementById('clearModal').classList.add('show');
            }

            clearAll() {
                // 先关闭模态框
                this.closeModal('clearModal');
                
                // 清空数据
                this.goals = [];
                this.saveGoals();
                
                // 立即重新渲染
                this.render();
                this.updateStats();
                
                // 显示成功提示
                this.showToast('所有任务已清空', 'success');
            }

            showExportBox() {
                if (this.goals.length === 0) {
                    this.showToast('当前没有数据可以导出', 'info');
                    return;
                }

                const exportData = {
                    version: '1.0',
                    exportTime: new Date().toISOString(),
                    goals: this.goals
                };

                this.exportData = JSON.stringify(exportData, null, 2);
                document.getElementById('exportTextarea').value = this.exportData;
                document.getElementById('exportBox').classList.add('show');
                
                // 自动选中文本
                const textarea = document.getElementById('exportTextarea');
                textarea.focus();
                textarea.select();
            }

            hideExportBox() {
                document.getElementById('exportBox').classList.remove('show');
                this.exportData = null;
            }

            copyToClipboard() {
                if (!this.exportData) return;
                
                navigator.clipboard.writeText(this.exportData).then(() => {
                    this.showToast('数据已复制到剪贴板', 'success');
                }).catch(() => {
                    // 降级方案
                    const textarea = document.getElementById('exportTextarea');
                    textarea.select();
                    document.execCommand('copy');
                    this.showToast('数据已复制到剪贴板', 'success');
                });
            }

            downloadFile() {
                if (!this.exportData) return;

                const blob = new Blob([this.exportData], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `goals-backup-${new Date().toISOString().split('T')[0]}.json`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);

                this.showToast('文件已下载', 'success');
            }

            showImportModal() {
                document.getElementById('importModal').classList.add('show');
                document.getElementById('importData').value = '';
                document.getElementById('importData').focus();
            }

            importData() {
                const importText = document.getElementById('importData').value.trim();
                
                if (!importText) {
                    this.showToast('请输入要导入的数据', 'error');
                    return;
                }

                try {
                    const importData = JSON.parse(importText);
                    
                    if (!importData.goals || !Array.isArray(importData.goals)) {
                        throw new Error('数据格式不正确');
                    }

                    // 验证数据结构
                    const validGoals = importData.goals.filter(goal => 
                        goal.text && typeof goal.text === 'string'
                    );

                    if (validGoals.length === 0) {
                        throw new Error('没有有效的任务数据');
                    }

                    // 确保每个任务都有必要的属性
                    const processedGoals = validGoals.map(goal => ({
                        id: goal.id || Date.now() + Math.random(),
                        text: goal.text,
                        completed: Boolean(goal.completed),
                        important: Boolean(goal.important),
                        pinned: Boolean(goal.pinned && !Boolean(goal.ignored)), // 忽略的任务不能置顶
                        ignored: Boolean(goal.ignored || false), // 兼容旧数据
                        createdAt: goal.createdAt || new Date().toISOString()
                    }));

                    this.goals = processedGoals;
                    this.saveGoals();
                    this.render();
                    this.updateStats();
                    this.closeModal('importModal');
                    this.showToast(`成功导入 ${processedGoals.length} 个任务`, 'success');

                } catch (error) {
                    this.showToast('导入失败：' + error.message, 'error');
                }
            }

            closeModal(modalId) {
                document.getElementById(modalId).classList.remove('show');
            }

            showToast(message, type = 'info') {
                const toast = document.getElementById('toast');
                const toastMessage = document.getElementById('toastMessage');
                
                toast.className = `toast ${type}`;
                toastMessage.textContent = message;
                toast.classList.add('show');

                setTimeout(() => {
                    toast.classList.remove('show');
                }, 3000);
            }

            saveGoals() {
                localStorage.setItem('goals', JSON.stringify(this.goals));
            }

            loadGoals() {
                const saved = localStorage.getItem('goals');
                return saved ? JSON.parse(saved) : [];
            }

            // 刷新页面功能 - 全部刷新并显示开场动画，同时清空任务输入框
            refreshData() {
                // 重新从localStorage加载数据
                this.goals = this.loadGoals();
                this.editingId = null;
                this.exportData = null;
                this.isAnimating = false;
                
                // 清空任务输入框
                document.getElementById('goalInput').value = '';
                this.updateAddButton();
                
                // 关闭所有模态框和导出框
                document.querySelectorAll('.modal.show').forEach(modal => {
                    modal.classList.remove('show');
                });
                document.getElementById('exportBox').classList.remove('show');
                
                // 重置所有动画类
                const header = document.querySelector('.header');
                const inputSection = document.querySelector('.input-section');
                const goalsContainer = document.querySelector('.goals-container');
                const bottomToolbar = document.querySelector('.bottom-toolbar');
                
                // 移除动画类
                header.style.animation = 'none';
                inputSection.style.animation = 'none';
                goalsContainer.style.animation = 'none';
                bottomToolbar.style.animation = 'none';
                
                // 强制重绘
                header.offsetHeight;
                inputSection.offsetHeight;
                goalsContainer.offsetHeight;
                bottomToolbar.offsetHeight;
                
                // 重新添加动画类
                header.style.animation = 'fadeInDown 0.6s ease';
                inputSection.style.animation = 'fadeInUp 0.6s ease';
                goalsContainer.style.animation = 'fadeInUp 0.6s ease';
                bottomToolbar.style.animation = 'fadeInUp 0.6s ease';
                
                // 重新渲染界面
                this.render();
                this.updateStats();
                
                // 显示刷新成功提示
                this.showToast('页面已刷新', 'success');
            }
        }

        // 初始化应用
        const goalManager = new GoalManager();
    </script>
</body>
</html>
